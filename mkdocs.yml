site_name: agent-container
site_description: Secure ephemeral sandbox for autonomous coding agents — Modal + OpenCode + open models
site_url: https://dvdthecoder.github.io/agent-container
repo_url: https://github.com/dvdthecoder/agent-container
repo_name: dvdthecoder/agent-container
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Get Started:
    - Quickstart: quickstart.md
    - Architecture: architecture.md
    - Model Setup: models.md
  - Using It:
    - Agent Backends: agents.md
    - MCP Integration: mcp.md
    - Dashboard: dashboard.md
    - Run Logs: logging.md
    - CLI Reference: cli.md
  - Deployment:
    - Team Setup: teams.md
    - Enterprise & GitLab: enterprise.md
    - Running & Contributing: contributing.md

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dvdthecoder/agent-container
