name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  security-static:
    name: Static security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Bandit — Python security linter
        run: bandit -c pyproject.toml -r sandbox/ agent/ dashboard/ mcp/ --exit-zero --format json -o bandit-report.json
        continue-on-error: false

      - name: Upload bandit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14

      - name: detect-secrets scan
        run: |
          pip install detect-secrets
          # Initialise baseline if it does not exist yet
          if [ ! -f .secrets.baseline ]; then
            detect-secrets scan --exclude-files '\.env\.example' > .secrets.baseline
          fi
          detect-secrets audit .secrets.baseline --report --json || true
          detect-secrets scan --baseline .secrets.baseline --exclude-files '\.env\.example'

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --junitxml=junit-unit-${{ matrix.python-version }}.xml

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: junit-unit-py${{ matrix.python-version }}
          path: junit-unit-${{ matrix.python-version }}.xml
          retention-days: 14
