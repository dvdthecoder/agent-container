name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"   # every Monday at 03:00 UTC
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: pip-audit — known CVE check
        run: |
          # Freeze exact installed versions and strip our own editable package.
          # pip-audit --skip-editable is unreliable; filtering pip freeze is not.
          pip freeze | grep -v "^agent-container\|^-e " > /tmp/frozen-deps.txt
          pip-audit -r /tmp/frozen-deps.txt --output pip-audit-report.json --format json

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

  dependency-review:
    name: Dependency review (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          # Blocks PRs that introduce dependencies with known CVEs >= moderate

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we scan all commits in a PR

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan \
            --exclude-files '\.env\.example' \
            --exclude-files '\.secrets\.baseline' \
            --baseline .secrets.baseline 2>/dev/null || \
          detect-secrets scan \
            --exclude-files '\.env\.example' > .secrets.baseline
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files '\.env\.example'

  docker-image-scan:
    name: Container image scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # security-events write is required for SARIF upload — only available on
    # GitHub Advanced Security (paid). Output to table format instead so results
    # are visible in the run log on all plans.
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner on repo
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
