name: Integration tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Integration tests use a stub agent — no LLM calls, no external API cost.
# They require a self-hosted runner with Daytona installed and running.
# If no self-hosted runner is available, the job is skipped gracefully.

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration (stub agent)
    # Uses a self-hosted runner tagged daytona — skip if not available
    runs-on: [self-hosted, daytona]
    timeout-minutes: 15

    env:
      DAYTONA_SERVER_URL: http://localhost:3986
      DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Stub agent — no real LLM needed
      AGENT_BACKEND: stub
      OPENAI_API_KEY: local
      OPENAI_BASE_URL: http://localhost:30000/v1   # not called in stub mode

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Verify Daytona is reachable
        run: |
          curl -sf http://localhost:3986/health || \
          (echo "Daytona not running on self-hosted runner — skipping integration tests" && exit 0)

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short --junitxml=junit-integration.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-integration
          path: junit-integration.xml
          retention-days: 14

      - name: Verify no workspaces left dangling
        if: always()
        run: |
          # Confirm teardown guarantee — no workspace should survive a run
          python -c "
          import subprocess, json, sys
          result = subprocess.run(['daytona', 'list', '--json'], capture_output=True, text=True)
          workspaces = json.loads(result.stdout or '[]')
          test_workspaces = [w for w in workspaces if w.get('name','').startswith('agent-')]
          if test_workspaces:
              print(f'WARN: {len(test_workspaces)} workspace(s) not torn down:')
              for w in test_workspaces:
                  print(f'  - {w[\"name\"]}')
              sys.exit(1)
          print('OK: no dangling workspaces')
          "
