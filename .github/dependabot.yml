version: 2

updates:
  # ── Python dependencies ───────────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      # Group non-breaking updates into a single PR to reduce noise
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major version bumps reviewed manually — they may break the API contract
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"

  # ── GitHub Actions ────────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: UTC
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
