<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agent-container dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #58a6ff;
      --green:   #3fb950;
      --red:     #f85149;
      --yellow:  #d29922;
      --purple:  #bc8cff;
      --mono:    "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;

      /* column widths shared between header and row cells */
      --col-expand:  20px;
      --col-dot:     16px;
      --col-runid:   140px;
      --col-repo:    1fr;
      --col-started: 100px;
      --col-ended:   100px;
      --col-backend: 76px;
      --col-source:  76px;
      --col-status:  68px;
      --col-pr:      60px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ---- layout ---- */
    header {
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
    }
    header h1 { font-size: 15px; font-weight: 600; }
    header span { font-size: 11px; color: var(--muted); }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - 49px);
    }

    /* ---- left sidebar ---- */
    #sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .panel {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 2px; }

    input, select, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 6px 8px;
      outline: none;
      font-family: inherit;
      resize: vertical;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 14px;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-secondary:disabled { opacity: .4; cursor: not-allowed; }

    /* serve status */
    .serve-row { display: flex; gap: 8px; align-items: center; }
    .serve-row select { flex: 1; }
    #serve-status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
    }
    #serve-status-badge.active  { background: rgba(63,185,80,.2);  color: var(--green); }
    #serve-status-badge.unknown { background: rgba(139,148,158,.15); color: var(--muted); }

    /* ---- main area ---- */
    #main {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* ---- filter toolbar ---- */
    #filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #filter-bar label {
      font-size: 11px;
      color: var(--muted);
      margin: 0;
      white-space: nowrap;
    }
    #filter-bar select {
      width: auto;
      font-size: 12px;
      padding: 4px 6px;
      background: var(--bg);
    }
    #run-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
    }

    /* ---- column header row ---- */
    #list-header {
      display: grid;
      grid-template-columns:
        var(--col-expand)
        var(--col-dot)
        var(--col-runid)
        var(--col-repo)
        var(--col-started)
        var(--col-ended)
        var(--col-backend)
        var(--col-source)
        var(--col-status)
        var(--col-pr);
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-bottom: 2px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 5;
      flex-shrink: 0;
    }
    .col-hdr {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
    }

    /* ---- run list ---- */
    #run-list {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    #empty-state {
      padding: 48px 32px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ---- run row ---- */
    .run-row {
      border-bottom: 1px solid var(--border);
    }
    .run-row.hidden { display: none; }

    .run-summary {
      display: grid;
      grid-template-columns:
        var(--col-expand)
        var(--col-dot)
        var(--col-runid)
        var(--col-repo)
        var(--col-started)
        var(--col-ended)
        var(--col-backend)
        var(--col-source)
        var(--col-status)
        var(--col-pr);
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      cursor: pointer;
      user-select: none;
      transition: background .1s;
    }
    .run-summary:hover { background: rgba(88,166,255,.05); }
    .run-row.expanded .run-summary { background: rgba(88,166,255,.08); }

    .expand-icon {
      font-size: 10px;
      color: var(--muted);
      width: 12px;
      flex-shrink: 0;
      transition: transform .15s;
      justify-self: center;
    }
    .run-row.expanded .expand-icon { transform: rotate(90deg); }

    .phase-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      justify-self: center;
    }
    .phase-dot.BOOTING  { background: var(--yellow); animation: pulse 1s infinite; }
    .phase-dot.CLONING  { background: var(--yellow); animation: pulse 1s infinite; }
    .phase-dot.RUNNING  { background: var(--accent);  animation: pulse 1s infinite; }
    .phase-dot.TESTING  { background: var(--purple);  animation: pulse 1s infinite; }
    .phase-dot.PR       { background: var(--purple);  animation: pulse 1s infinite; }
    .phase-dot.DONE     { background: var(--green); }
    .phase-dot.FAILED   { background: var(--red); }
    .phase-dot.UNKNOWN  { background: var(--muted); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .35; }
    }

    .run-id-text {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .run-repo-text {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .run-status-text {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    .run-status-text.DONE    { color: var(--green); }
    .run-status-text.FAILED  { color: var(--red); }
    .run-status-text.UNKNOWN { color: var(--muted); font-style: italic; }

    .run-started-text {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .run-ended-text {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge-pr {
      background: rgba(63,185,80,.15);
      color: var(--green);
      border: 1px solid rgba(63,185,80,.3);
      text-decoration: none;
      display: none;  /* shown only when pr_url is set */
      text-align: center;
    }
    .badge-pr:hover { opacity: .8; }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: .04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      text-align: center;
    }
    .badge-backend {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .badge-source.cli       { background: #21262d; color: var(--muted); border: 1px solid var(--border); }
    .badge-source.dashboard { background: rgba(88,166,255,.15); color: var(--accent); border: 1px solid rgba(88,166,255,.3); }

    /* ---- expanded log detail ---- */
    .run-detail {
      display: none;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .run-row.expanded .run-detail { display: block; }

    .run-detail-meta {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .run-detail-meta .meta-item {
      font-size: 11px;
      color: var(--muted);
    }
    .run-detail-meta .meta-item span {
      color: var(--text);
    }

    .run-log {
      padding: 12px 20px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
    }

    .log-line  { color: var(--text); }
    .log-phase { color: var(--accent); font-weight: 700; }
    .log-done-ok   { color: var(--green); font-weight: 700; }
    .log-done-fail { color: var(--red);   font-weight: 700; }
    .log-ts { color: var(--muted); user-select: none; margin-right: 8px; }

    .log-no-events {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 10px;
      font-style: italic;
    }
    .log-summary-row { display: flex; gap: 8px; }
    .log-summary-key { color: var(--muted); min-width: 80px; }
    .log-summary-val { color: var(--text); word-break: break-all; }
    .log-summary-val.ok   { color: var(--green); }
    .log-summary-val.fail { color: var(--red); }

    .pr-link {
      display: inline-block;
      background: var(--green);
      color: #000;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      text-decoration: none;
      margin-left: auto;
    }
    .pr-link:hover { opacity: .85; }
  </style>
</head>
<body>

<header>
  <h1>agent-container</h1>
  <span>dashboard</span>
</header>

<div class="layout">
  <!-- ---- sidebar ---- -->
  <div id="sidebar">

    <!-- serve panel -->
    <div class="panel">
      <div class="panel-title">
        Model server
        <span id="serve-status-badge" class="unknown">unknown</span>
      </div>
      <div>
        <label for="srv-profile">Profile</label>
        <select id="srv-profile">
          <option value="test">test — Qwen2.5-Coder 7B (A10G)</option>
          <option value="prod">prod — Qwen3-Coder 80B (2×A100)</option>
          <option value="prod-minimax" data-profile="prod" data-model="minimax-m2.5">prod — MiniMax M2.5 (8×A100)</option>
          <option value="experiment">experiment — SGLang (A10G)</option>
        </select>
      </div>
      <div>
        <button id="deploy-btn" class="btn-secondary" type="button" onclick="deployServe()">Deploy</button>
      </div>
    </div>

    <!-- new run form -->
    <div class="panel">
      <div class="panel-title">New run</div>
      <div>
        <label for="inp-repo">Repo URL</label>
        <input id="inp-repo" type="url" placeholder="https://github.com/org/repo" required />
      </div>
      <div>
        <label for="inp-task">Task</label>
        <textarea id="inp-task" rows="4" placeholder="Describe what the agent should do…" required></textarea>
      </div>
      <div>
        <label for="inp-backend">Backend</label>
        <select id="inp-backend">
          <option value="aider">aider</option>
          <option value="opencode">opencode</option>
          <option value="claude">claude</option>
          <option value="gemini">gemini</option>
          <option value="stub">stub</option>
        </select>
      </div>
      <div>
        <label for="inp-branch">Base branch</label>
        <input id="inp-branch" type="text" value="main" />
      </div>
      <div style="display:flex;gap:12px;align-items:center;">
        <label style="display:flex;align-items:center;gap:4px;margin:0;font-size:12px">
          <input id="inp-pr" type="checkbox" checked /> Create PR
        </label>
        <label style="display:flex;align-items:center;gap:4px;margin:0;font-size:12px">
          <input id="inp-tests" type="checkbox" checked /> Run tests
        </label>
      </div>
      <button id="start-btn" class="btn-primary" type="button" onclick="startRun()">Start run</button>
    </div>

  </div>

  <!-- ---- main run list ---- -->
  <div id="main">

    <!-- filter toolbar -->
    <div id="filter-bar">
      <label for="flt-status">Status</label>
      <select id="flt-status" onchange="applyFilters()">
        <option value="">All</option>
        <option value="DONE">Done</option>
        <option value="FAILED">Failed</option>
        <option value="RUNNING">Running</option>
        <option value="UNKNOWN">Unknown</option>
      </select>

      <label for="flt-backend">Backend</label>
      <select id="flt-backend" onchange="applyFilters()">
        <option value="">All</option>
        <option value="aider">aider</option>
        <option value="opencode">opencode</option>
        <option value="claude">claude</option>
        <option value="gemini">gemini</option>
        <option value="stub">stub</option>
      </select>

      <label for="flt-source">Source</label>
      <select id="flt-source" onchange="applyFilters()">
        <option value="">All</option>
        <option value="cli">cli</option>
        <option value="dashboard">dashboard</option>
      </select>

      <span id="run-count"></span>
    </div>

    <!-- column headers -->
    <div id="list-header">
      <div class="col-hdr"></div>
      <div class="col-hdr"></div>
      <div class="col-hdr">Run ID</div>
      <div class="col-hdr">Repository</div>
      <div class="col-hdr">Started</div>
      <div class="col-hdr">Ended</div>
      <div class="col-hdr">Backend</div>
      <div class="col-hdr">Source</div>
      <div class="col-hdr">Status</div>
      <div class="col-hdr">PR</div>
    </div>

    <div id="run-list">
      <div id="empty-state">No runs yet — start one from the sidebar.</div>
    </div>
  </div>
</div>

<script>
// ------------------------------------------------------------------ state
const runs = {};  // run_id → { meta, logLines[], sse, expanded }

// ------------------------------------------------------------------ API
async function apiPost(path, body) {
  const r = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ------------------------------------------------------------------ serve panel
async function deployServe() {
  const sel = document.getElementById('srv-profile');
  const opt = sel.options[sel.selectedIndex];
  const profile = opt.dataset.profile || opt.value;
  const model   = opt.dataset.model   || null;
  const btn = document.getElementById('deploy-btn');
  btn.disabled = true;
  btn.textContent = 'Deploying…';
  try {
    await apiPost('/api/serve/deploy', { profile, model });
  } catch (e) {
    alert('Deploy failed: ' + e.message);
  } finally {
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Deploy'; }, 8000);
  }
}

async function pollServeStatus() {
  try {
    const { apps } = await fetch('/api/serve/status').then(r => r.json());
    const badge = document.getElementById('serve-status-badge');
    if (apps && apps.length) {
      badge.textContent = apps[0].state || 'active';
      badge.className = 'active';
    } else {
      badge.textContent = 'no app';
      badge.className = 'unknown';
    }
  } catch { /* ignore */ }
}
setInterval(pollServeStatus, 30000);
pollServeStatus();

// ------------------------------------------------------------------ start run
async function startRun() {
  const repo    = document.getElementById('inp-repo').value.trim();
  const task    = document.getElementById('inp-task').value.trim();
  if (!repo || !task) return;

  const backend     = document.getElementById('inp-backend').value;
  const base_branch = document.getElementById('inp-branch').value || 'main';
  const btn = document.getElementById('start-btn');
  btn.disabled = true;

  try {
    const { run_id } = await apiPost('/api/runs', {
      repo, task, backend, base_branch,
      create_pr:       document.getElementById('inp-pr').checked,
      run_tests:       document.getElementById('inp-tests').checked,
      timeout_seconds: 300,
    });
    // New run goes to the top (prepend=true)
    addRow({
      run_id, repo, task, backend,
      initiated_by: 'dashboard',
      base_branch,
      phase: 'BOOTING',
      started_at: new Date().toISOString(),
    }, true);
    toggleRow(run_id, true);
    subscribeSSE(run_id);
  } catch (e) {
    alert('Failed to start run: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

// ------------------------------------------------------------------ run row
function fmtStarted(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleString('en-US', {
      month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit', hour12: false,
    });
  } catch { return iso; }
}

function prNumber(url) {
  if (!url) return null;
  const m = url.match(/\/(pull|merge_requests)\/(\d+)/);
  return m ? '#' + m[2] : null;
}

function addRow(meta, prepend = false) {
  const { run_id, repo, task, backend, initiated_by, base_branch, phase, started_at, finished_at, pr_url } = meta;

  if (runs[run_id]) {
    // already exists — update meta only
    runs[run_id].meta = meta;
    return;
  }

  // remove empty state
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  const srcClass = escHtml(initiated_by || 'cli');
  const phaseClass = escHtml(phase);
  const statusCls = ['DONE','FAILED','UNKNOWN'].includes(phase) ? phase : '';
  const prNum = prNumber(pr_url);

  const row = document.createElement('div');
  row.className = 'run-row';
  row.id = `row-${run_id}`;
  row.dataset.phase   = phase;
  row.dataset.backend = backend || '';
  row.dataset.source  = initiated_by || 'cli';

  row.innerHTML = `
    <div class="run-summary" onclick="toggleRow('${run_id}')">
      <span class="expand-icon">▶</span>
      <div class="phase-dot ${phaseClass}" id="dot-${run_id}"></div>
      <span class="run-id-text">${escHtml(run_id)}</span>
      <span class="run-repo-text">${escHtml(repo)}</span>
      <span class="run-started-text">${escHtml(fmtStarted(started_at))}</span>
      <span class="run-ended-text">${escHtml(fmtStarted(finished_at))}</span>
      <span class="badge badge-backend">${escHtml(backend)}</span>
      <span class="badge badge-source ${srcClass}">${srcClass}</span>
      <span class="run-status-text ${statusCls}" id="phase-label-${run_id}">${escHtml(phase)}</span>
      <a id="pr-badge-${run_id}" class="badge badge-pr"
         href="${escHtml(pr_url || '#')}" target="_blank"
         style="${prNum ? 'display:block' : 'display:none'}"
         onclick="event.stopPropagation()">${escHtml(prNum || '')}</a>
    </div>
    <div class="run-detail">
      <div class="run-detail-meta">
        <div class="meta-item">branch <span>${escHtml(base_branch)}</span></div>
        <div class="meta-item">task <span>${escHtml(task ? task.slice(0, 80) + (task.length > 80 ? '…' : '') : '')}</span></div>
        <a id="pr-link-${run_id}" class="pr-link" style="display:none" href="#" target="_blank">Open PR →</a>
      </div>
      <div class="run-log" id="log-${run_id}"></div>
    </div>
  `;

  const list = document.getElementById('run-list');
  if (prepend) list.prepend(row);
  else         list.append(row);

  runs[run_id] = { meta, logLines: [], sse: null, expanded: false };
  updateRunCount();
}

// ------------------------------------------------------------------ filters
function applyFilters() {
  const fltStatus  = document.getElementById('flt-status').value;
  const fltBackend = document.getElementById('flt-backend').value;
  const fltSource  = document.getElementById('flt-source').value;

  let visible = 0;
  for (const run_id of Object.keys(runs)) {
    const row = document.getElementById(`row-${run_id}`);
    if (!row) continue;
    const phase   = row.dataset.phase   || '';
    const backend = row.dataset.backend || '';
    const source  = row.dataset.source  || '';

    // status filter: active phases (BOOTING, CLONING, RUNNING, TESTING, PR) all
    // map to "RUNNING" for filter purposes
    const effectivePhase = isTerminal(phase) || phase === 'UNKNOWN' ? phase : 'RUNNING';

    const show = (
      (!fltStatus  || fltStatus  === effectivePhase) &&
      (!fltBackend || fltBackend === backend) &&
      (!fltSource  || fltSource  === source)
    );

    row.classList.toggle('hidden', !show);
    if (show) visible++;
  }

  updateRunCount(visible);
}

function updateRunCount(visible) {
  const total = Object.keys(runs).length;
  const shown = visible !== undefined ? visible : total;
  const el = document.getElementById('run-count');
  if (el) el.textContent = shown === total ? `${total} run${total !== 1 ? 's' : ''}` : `${shown} / ${total}`;
}

// ------------------------------------------------------------------ toggle / phase
function toggleRow(run_id, forceOpen) {
  const row = document.getElementById(`row-${run_id}`);
  if (!row) return;
  const r = runs[run_id];
  const open = forceOpen !== undefined ? forceOpen : !r.expanded;
  r.expanded = open;
  row.classList.toggle('expanded', open);

  if (open) {
    // First expand — replay log history from SQLite if not already loaded
    if (!r.historyLoaded) {
      r.historyLoaded = true;
      fetch(`/api/runs/${run_id}/events`)
        .then(res => res.json())
        .then(events => {
          // Only render if no live lines have arrived yet (avoid duplicates)
          if (r.logLines.length > 0) return;
          if (events.length > 0) {
            for (const ev of events) {
              const ts = new Date(ev.ts).toLocaleTimeString('en-US', { hour12: false });
              appendLog(run_id, ts, ev.text || '', 'log-line');
            }
          } else {
            // No stored events (CLI run or dashboard run with no streaming).
            // Fetch the run detail record and show a summary.
            fetch(`/api/runs/${run_id}`)
              .then(r2 => r2.json())
              .then(detail => renderRunSummary(run_id, detail))
              .catch(() => renderRunSummary(run_id, null));
          }
        })
        .catch(() => renderRunSummary(run_id, null));
    }
    const log = document.getElementById(`log-${run_id}`);
    if (log) log.scrollTop = log.scrollHeight;
  }
}

function updatePhase(run_id, phase) {
  const r = runs[run_id];
  if (r) r.meta.phase = phase;

  const row = document.getElementById(`row-${run_id}`);
  if (row) row.dataset.phase = phase;

  const dot = document.getElementById(`dot-${run_id}`);
  if (dot) dot.className = `phase-dot ${phase}`;

  const label = document.getElementById(`phase-label-${run_id}`);
  if (label) {
    label.textContent = phase;
    label.className = `run-status-text ${['DONE','FAILED','UNKNOWN'].includes(phase) ? phase : ''}`;
  }
}

// ------------------------------------------------------------------ SSE
function subscribeSSE(run_id) {
  const r = runs[run_id];
  if (!r || r.sse) return;

  const sse = new EventSource(`/api/runs/${run_id}/stream`);
  r.sse = sse;

  sse.onmessage = (e) => {
    let ev;
    try { ev = JSON.parse(e.data); } catch { return; }
    handleEvent(run_id, ev);
  };

  sse.onerror = () => { sse.close(); r.sse = null; };
}

function handleEvent(run_id, ev) {
  const r = runs[run_id];
  if (!r) return;
  const ts = new Date((ev.ts || Date.now() / 1000) * 1000)
    .toLocaleTimeString('en-US', { hour12: false });

  if (ev.type === 'phase') {
    updatePhase(run_id, ev.phase);
    appendLog(run_id, ts, `▶ ${ev.phase}`, 'log-phase');

  } else if (ev.type === 'log') {
    appendLog(run_id, ts, ev.text || '', 'log-line');

  } else if (ev.type === 'done') {
    const phase = ev.success ? 'DONE' : 'FAILED';
    updatePhase(run_id, phase);

    if (ev.pr_url) {
      // update summary-row PR badge
      const badge = document.getElementById(`pr-badge-${run_id}`);
      if (badge) {
        const num = prNumber(ev.pr_url);
        badge.href = ev.pr_url;
        badge.textContent = num || 'PR';
        badge.style.display = 'block';
      }
      // keep expanded-detail link too
      const link = document.getElementById(`pr-link-${run_id}`);
      if (link) { link.href = ev.pr_url; link.style.display = 'inline-block'; }
    }

    const cls = ev.success ? 'log-done-ok' : 'log-done-fail';
    const msg = ev.success
      ? `✓ DONE${ev.diff_stat ? '  ' + ev.diff_stat : ''}`
      : `✗ FAILED${ev.error ? '  ' + ev.error : ''}`;
    appendLog(run_id, ts, msg, cls);

    if (r.sse) { r.sse.close(); r.sse = null; }
  }
}

function appendLog(run_id, ts, text, cls) {
  const r = runs[run_id];
  if (!r) return;

  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = `<span class="log-ts">${escHtml(ts)}</span>${escHtml(text)}`;
  r.logLines.push(div);

  const log = document.getElementById(`log-${run_id}`);
  if (log) {
    log.appendChild(div);
    // auto-scroll only if expanded
    if (r.expanded) log.scrollTop = log.scrollHeight;
  }
}

function renderRunSummary(run_id, detail) {
  const log = document.getElementById(`log-${run_id}`);
  if (!log) return;

  const noEvt = document.createElement('div');
  noEvt.className = 'log-no-events';
  noEvt.textContent = detail
    ? (detail.initiated_by === 'cli'
        ? 'CLI run — console output was not captured. Stored metadata:'
        : 'No log output stored for this run.')
    : 'Could not load run details.';
  log.appendChild(noEvt);

  if (!detail) return;

  function row(key, val, cls) {
    if (val == null || val === '') return;
    const d = document.createElement('div');
    d.className = 'log-summary-row';
    d.innerHTML = `<span class="log-summary-key">${escHtml(key)}</span>`
                + `<span class="log-summary-val${cls ? ' ' + cls : ''}">${escHtml(String(val))}</span>`;
    log.appendChild(d);
  }

  const outcome = detail.outcome || detail.phase || '—';
  row('outcome',    outcome, outcome === 'success' ? 'ok' : (outcome ? 'fail' : ''));
  if (detail.branch)     row('branch',    detail.branch);
  if (detail.pr_url)     row('pr',        detail.pr_url);
  if (detail.duration_s != null) row('duration', detail.duration_s + 's');
  if (detail.sandbox_id) row('sandbox',   detail.sandbox_id);
  if (detail.error)      row('error',     detail.error, 'fail');
  if (detail.diff_stat)  row('diff',      detail.diff_stat);
}

// ------------------------------------------------------------------ utils
function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function isTerminal(phase) {
  return phase === 'DONE' || phase === 'FAILED';
}

// ------------------------------------------------------------------ boot
(async () => {
  try {
    const list = await fetch('/api/runs').then(r => r.json());
    // Server returns newest-first; append each in order so newest stays on top.
    for (const run of list) {
      addRow({
        run_id:       run.run_id,
        repo:         run.repo,
        task:         run.task || '',
        backend:      run.backend || 'opencode',
        initiated_by: run.initiated_by || 'cli',
        base_branch:  run.base_branch || 'main',
        phase:        run.phase || 'UNKNOWN',
        started_at:   run.started_at   || null,
        finished_at:  run.finished_at  || null,
        pr_url:       run.pr_url       || null,
      }, false);  // append — server list is already newest-first
      updatePhase(run.run_id, run.phase || 'UNKNOWN');

      // re-attach SSE for active dashboard runs
      if (!isTerminal(run.phase) && run.phase !== 'UNKNOWN' && run.initiated_by === 'dashboard') {
        subscribeSSE(run.run_id);
      }

      // PR link in expanded detail (addRow already sets the summary badge)
      if (run.pr_url) {
        const link = document.getElementById(`pr-link-${run.run_id}`);
        if (link) { link.href = run.pr_url; link.style.display = 'inline-block'; }
      }
    }
    applyFilters();  // update count after boot
  } catch { /* dashboard works offline */ }
})();
</script>
</body>
</html>
