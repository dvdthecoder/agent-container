<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agent-container dashboard</title>
  <style>
    /* --------------------------------------------------------- reset & base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #58a6ff;
      --green:   #3fb950;
      --red:     #f85149;
      --yellow:  #d29922;
      --purple:  #bc8cff;
      --mono:    "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* --------------------------------------------------------- layout */
    header {
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 15px; font-weight: 600; color: var(--text); }
    header span { font-size: 11px; color: var(--muted); }

    main {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      height: calc(100vh - 49px);
    }

    /* --------------------------------------------------------- sidebar */
    #sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #new-run-form {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #new-run-form h2 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 2px; }

    input, select, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 6px 8px;
      outline: none;
      font-family: inherit;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }

    #start-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 14px;
      cursor: pointer;
      margin-top: 4px;
    }

    #start-btn:hover { opacity: .88; }
    #start-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* --------------------------------------------------------- run list */
    #run-list { flex: 1; overflow-y: auto; }

    .run-card {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .1s;
    }

    .run-card:hover  { background: rgba(88,166,255,.06); }
    .run-card.active { background: rgba(88,166,255,.10); border-left: 2px solid var(--accent); }

    .run-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .phase-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .phase-dot.BOOTING  { background: var(--yellow); animation: pulse 1s infinite; }
    .phase-dot.CLONING  { background: var(--yellow); animation: pulse 1s infinite; }
    .phase-dot.RUNNING  { background: var(--accent);  animation: pulse 1s infinite; }
    .phase-dot.TESTING  { background: var(--purple);  animation: pulse 1s infinite; }
    .phase-dot.PR       { background: var(--purple);  animation: pulse 1s infinite; }
    .phase-dot.DONE     { background: var(--green); }
    .phase-dot.FAILED   { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .35; }
    }

    .run-id { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .run-repo { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-phase { font-size: 11px; color: var(--muted); }

    .badge-source {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge-source.cli      { background: #21262d; color: var(--muted); border: 1px solid var(--border); }
    .badge-source.dashboard { background: rgba(88,166,255,.15); color: var(--accent); border: 1px solid rgba(88,166,255,.3); }

    /* --------------------------------------------------------- serve panel */
    #serve-panel {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    #serve-panel h2 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    #serve-status-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
      margin-left: 8px;
    }
    #serve-status-badge.active { background: rgba(63,185,80,.2); color: var(--green); }
    #serve-status-badge.unknown { background: rgba(139,148,158,.15); color: var(--muted); }
    .serve-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    #deploy-btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    #deploy-btn:hover { border-color: var(--accent); color: var(--accent); }
    #deploy-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* --------------------------------------------------------- detail panel */
    #detail {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #detail-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #detail-header .repo-link {
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }

    #detail-header .repo-link:hover { text-decoration: underline; }

    #detail-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
    }

    #detail-meta .badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 7px;
      font-family: var(--mono);
      font-size: 11px;
    }

    #pr-link {
      display: inline-block;
      background: var(--green);
      color: #000;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 4px;
      text-decoration: none;
    }

    #pr-link:hover { opacity: .85; }
    #pr-link.hidden { display: none; }

    #log-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text);
      background: var(--bg);
    }

    .log-line { }
    .log-phase { color: var(--accent); font-weight: 700; }
    .log-done-ok   { color: var(--green); font-weight: 700; }
    .log-done-fail { color: var(--red);   font-weight: 700; }
    .log-ts { color: var(--muted); user-select: none; margin-right: 8px; }

    /* --------------------------------------------------------- empty state */
    #empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <h1>agent-container</h1>
  <span>dashboard</span>
</header>

<main>
  <!-- ------------------------------------------------ sidebar -->
  <div id="sidebar">
    <!-- ---- serve panel ---- -->
    <div id="serve-panel">
      <h2>Model server <span id="serve-status-badge" class="unknown">unknown</span></h2>
      <div class="serve-row">
        <select id="srv-profile" style="flex:1">
          <option value="test">test — Qwen2.5-Coder 7B (A10G)</option>
          <option value="prod">prod — Qwen3-Coder 80B (2×A100)</option>
          <option value="prod-minimax" data-profile="prod" data-model="minimax-m2.5">prod — MiniMax M2.5 (8×A100)</option>
          <option value="experiment">experiment — SGLang (A10G)</option>
        </select>
        <button id="deploy-btn" type="button" onclick="deployServe()">Deploy</button>
      </div>
    </div>

    <form id="new-run-form" onsubmit="return false">
      <h2>New run</h2>
      <div>
        <label for="inp-repo">Repo URL</label>
        <input id="inp-repo" type="url" placeholder="https://github.com/org/repo" required />
      </div>
      <div>
        <label for="inp-task">Task</label>
        <textarea id="inp-task" rows="3" placeholder="Describe what the agent should do…" required></textarea>
      </div>
      <div>
        <label for="inp-backend">Backend</label>
        <select id="inp-backend">
          <option value="aider">aider</option>
          <option value="opencode">opencode</option>
          <option value="claude">claude</option>
          <option value="gemini">gemini</option>
          <option value="stub">stub</option>
        </select>
      </div>
      <div>
        <label for="inp-branch">Base branch</label>
        <input id="inp-branch" type="text" value="main" />
      </div>
      <div style="display:flex;gap:12px;align-items:center;">
        <label style="display:flex;align-items:center;gap:4px;margin:0">
          <input id="inp-pr" type="checkbox" checked /> Create PR
        </label>
        <label style="display:flex;align-items:center;gap:4px;margin:0">
          <input id="inp-tests" type="checkbox" checked /> Run tests
        </label>
      </div>
      <button id="start-btn" type="button" onclick="startRun()">Start run</button>
    </form>

    <div id="run-list"></div>
  </div>

  <!-- ------------------------------------------------ detail -->
  <div id="detail">
    <div id="empty">Select a run or start one →</div>
  </div>
</main>

<script>
// ------------------------------------------------------------------ state
const runs = {};       // run_id → { state, card el, sse }
let activeRunId = null;

// ------------------------------------------------------------------ serve panel
async function deployServe() {
  const sel = document.getElementById('srv-profile');
  const opt = sel.options[sel.selectedIndex];
  const profile = opt.dataset.profile || opt.value;
  const model   = opt.dataset.model   || null;
  const btn = document.getElementById('deploy-btn');
  btn.disabled = true;
  btn.textContent = 'Deploying…';
  try {
    await apiPost('/api/serve/deploy', { profile, model });
  } catch (e) {
    alert('Deploy failed: ' + e.message);
  } finally {
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Deploy'; }, 8000);
  }
}

async function pollServeStatus() {
  try {
    const { apps } = await fetch('/api/serve/status').then(r => r.json());
    const badge = document.getElementById('serve-status-badge');
    if (apps && apps.length) {
      badge.textContent = apps[0].state || 'active';
      badge.className = 'active';
    } else {
      badge.textContent = 'no app';
      badge.className = 'serve-status-badge unknown';
    }
  } catch { /* ignore */ }
}
setInterval(pollServeStatus, 30000);
pollServeStatus();

// ------------------------------------------------------------------ API helpers
async function apiPost(path, body) {
  const r = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ------------------------------------------------------------------ start run
async function startRun() {
  const repo  = document.getElementById('inp-repo').value.trim();
  const task  = document.getElementById('inp-task').value.trim();
  if (!repo || !task) return;

  const btn = document.getElementById('start-btn');
  btn.disabled = true;

  const backend     = document.getElementById('inp-backend').value;
  const base_branch = document.getElementById('inp-branch').value || 'main';
  try {
    const { run_id } = await apiPost('/api/runs', {
      repo,
      task,
      backend,
      base_branch,
      create_pr:       document.getElementById('inp-pr').checked,
      run_tests:       document.getElementById('inp-tests').checked,
      timeout_seconds: 300,
    });
    addRun(run_id, repo, task, backend, 'dashboard', base_branch);
    openRun(run_id);
  } catch (e) {
    alert('Failed to start run: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

// ------------------------------------------------------------------ run card
function addRun(run_id, repo, task, backend, initiated_by, base_branch) {
  initiated_by = initiated_by || 'cli';
  const card = document.createElement('div');
  card.className = 'run-card';
  card.dataset.runId = run_id;
  card.innerHTML = `
    <div class="run-card-header">
      <div class="phase-dot BOOTING" id="dot-${run_id}"></div>
      <span class="run-id">${escHtml(run_id)}</span>
      <span class="badge-source ${escHtml(initiated_by)}">${escHtml(initiated_by)}</span>
    </div>
    <div class="run-repo">${escHtml(repo)}</div>
    <div class="run-phase" id="phase-label-${run_id}">BOOTING</div>
  `;
  card.onclick = () => openRun(run_id);
  document.getElementById('run-list').prepend(card);

  runs[run_id] = { repo, task, backend, initiated_by, base_branch: base_branch || 'main', phase: 'BOOTING', card, logLines: [] };
}

function updateCard(run_id, phase) {
  const r = runs[run_id];
  if (!r) return;
  r.phase = phase;
  const dot = document.getElementById('dot-' + run_id);
  if (dot) {
    dot.className = `phase-dot ${phase}`;
  }
  const label = document.getElementById('phase-label-' + run_id);
  if (label) label.textContent = phase;
  if (r.card) {
    r.card.className = 'run-card' + (activeRunId === run_id ? ' active' : '');
  }
}

// ------------------------------------------------------------------ detail panel
function openRun(run_id) {
  if (activeRunId === run_id) return;

  // Deactivate old card
  if (activeRunId && runs[activeRunId]) {
    runs[activeRunId].card.classList.remove('active');
  }

  activeRunId = run_id;
  const r = runs[run_id];
  r.card.classList.add('active');

  const detail = document.getElementById('detail');
  detail.innerHTML = `
    <div id="detail-header">
      <a class="repo-link" href="${escHtml(r.repo)}" target="_blank">${escHtml(r.repo)}</a>
      <div id="detail-meta">
        <span class="badge">${escHtml(r.backend)}</span>
        <span class="badge">${escHtml(r.base_branch)}</span>
        <span class="badge-source ${escHtml(r.initiated_by)}">${escHtml(r.initiated_by)}</span>
        <span id="detail-phase">${r.phase}</span>
        <a id="pr-link" class="hidden" href="#" target="_blank">Open PR →</a>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">${escHtml(r.task)}</div>
    </div>
    <div id="log-area"></div>
  `;

  // Replay buffered log lines
  const logArea = document.getElementById('log-area');
  for (const line of r.logLines) {
    logArea.appendChild(line.cloneNode(true));
  }
  logArea.scrollTop = logArea.scrollHeight;

  // Subscribe to SSE if not already
  if (!r.sse && !isTerminal(r.phase)) {
    subscribeSSE(run_id);
  }
}

function isTerminal(phase) {
  return phase === 'DONE' || phase === 'FAILED';
}

// ------------------------------------------------------------------ SSE
function subscribeSSE(run_id) {
  const r = runs[run_id];
  if (!r) return;

  const sse = new EventSource(`/api/runs/${run_id}/stream`);
  r.sse = sse;

  sse.onmessage = (e) => {
    let ev;
    try { ev = JSON.parse(e.data); } catch { return; }
    handleEvent(run_id, ev);
  };

  sse.onerror = () => {
    sse.close();
    r.sse = null;
  };
}

function handleEvent(run_id, ev) {
  const r = runs[run_id];
  if (!r) return;

  const ts = new Date(ev.ts * 1000).toLocaleTimeString('en-US', { hour12: false });

  if (ev.type === 'phase') {
    updateCard(run_id, ev.phase);
    if (activeRunId === run_id) {
      const el = document.getElementById('detail-phase');
      if (el) el.textContent = ev.phase;
    }
    appendLog(run_id, ts, `▶ ${ev.phase}`, 'log-phase');

  } else if (ev.type === 'log') {
    appendLog(run_id, ts, ev.text || '', 'log-line');

  } else if (ev.type === 'done') {
    const phase = ev.success ? 'DONE' : 'FAILED';
    updateCard(run_id, phase);

    if (activeRunId === run_id) {
      const el = document.getElementById('detail-phase');
      if (el) el.textContent = phase;

      if (ev.pr_url) {
        const link = document.getElementById('pr-link');
        if (link) {
          link.href = ev.pr_url;
          link.textContent = 'Open PR →';
          link.classList.remove('hidden');
        }
      }
    }

    const cls = ev.success ? 'log-done-ok' : 'log-done-fail';
    const msg = ev.success
      ? `✓ DONE${ev.diff_stat ? '  ' + ev.diff_stat : ''}`
      : `✗ FAILED${ev.error ? '  ' + ev.error : ''}`;
    appendLog(run_id, ts, msg, cls);

    if (r.sse) { r.sse.close(); r.sse = null; }
  }
}

function appendLog(run_id, ts, text, cls) {
  const r = runs[run_id];
  if (!r) return;

  const span = document.createElement('div');
  span.className = cls;
  span.innerHTML = `<span class="log-ts">${escHtml(ts)}</span>${escHtml(text)}`;
  r.logLines.push(span);

  if (activeRunId === run_id) {
    const logArea = document.getElementById('log-area');
    if (logArea) {
      logArea.appendChild(span.cloneNode(true));
      logArea.scrollTop = logArea.scrollHeight;
    }
  }
}

// ------------------------------------------------------------------ utils
function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ------------------------------------------------------------------ boot — load existing runs
(async () => {
  try {
    const list = await fetch('/api/runs').then(r => r.json());
    // list is newest-first from SQLite; prepend in order so newest ends up on top
    for (const run of list) {
      addRun(run.run_id, run.repo, run.task || '', run.backend || 'opencode', run.initiated_by, run.base_branch);
      updateCard(run.run_id, run.phase || 'DONE');
    }
  } catch { /* dashboard works offline */ }
})();
</script>
</body>
</html>
